<!DOCTYPE html>

    <title>3D Cube Explorer — Coach John's Math Tools</title>
    <style>
      .cj-header { background: linear-gradient(135deg,#1a237e,#3949ab); color: white; padding: 0; font-family: 'Segoe UI', sans-serif; }
      .cj-header-main { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; gap: 20px; flex-wrap: wrap; }
      .cj-logo img { height: 72px; width: auto; border-radius: 4px; display: block; }
      .cj-center { flex: 1; text-align: center; }
      .cj-center h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: 0.5px; line-height: 1.2; margin: 0; }

      .cj-center .cj-site a { color: rgba(255,255,255,0.85); font-size: 0.82rem; margin-top: 5px; display: inline-block; text-decoration: underline; }
      .cj-contact { text-align: right; font-size: 0.78rem; line-height: 1.8; opacity: 0.92; white-space: nowrap; }
      .cj-contact a { color: rgba(255,255,255,0.85); text-decoration: none; }
      .cj-contact a:hover { text-decoration: underline; }
      .cj-contact-lbl { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.75; margin-bottom: 4px; }
      @media(max-width:680px) {
        .cj-header-main { justify-content: center; text-align: center; }
        .cj-contact { text-align: center; white-space: normal; }
        .cj-logo img { height: 56px; }
        .cj-center h1 { font-size: 1.4rem; }
      }
    </style>
